<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>Login</h1>

        <form>

            <input type="email"
                   placeholder="Email Address">

            <input type="password"
                   placeholder="Password">

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            Don't have an account?
            <a href="register.html">
                Register
            </a>
        </p>

    </div>

</div>

</body>
</html>
