<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>Create Account</h1>

        <form>

            <input type="text"
                   placeholder="Full Name">

            <input type="email"
                   placeholder="Email">

            <input type="password"
                   placeholder="Password">

            <button type="submit">
                Register
            </button>

        </form>

        <p>
            Already have an account?
            <a href="login.html">
                Login
            </a>
        </p>

    </div>

</div>

</body>
</html>
